body:
  text: 呂帝聖迹紀要呂帝聖迹紀要序仙聖佛祖同此慈悲濟度我菩薩矢彌羅之願必欲度盡衆生是以廣大靈感無不聲應此度化慈祖後之高真仙聖同設心濟度代不乏人而傳顯於世則文帝與孚佑帝君及關某也顧某自皈依菩薩叨證真果即矢願永為護法凡菩薩光臨之地皆關某率領神將護從之時故無不應願之菩薩即無不隨光之關某也茲大法覺壇為吾孚佑帝君洪演大化之吉祥地某隨法駕臨壇者屢矣且某昔從帝君令攝祟於景雲內苑是某與帝君同有顯迹於人世者相傳又復纍世矣是以帝君之誓願固與菩薩等而帝君行願濟度千秋萬世靈感亦疊出不已即汗牛充棟不能悉盡而其纍世相傳化度事迹昭昭人間舊傳多襲訛謬附是以後世多議焉而不知所傳事迹皆有歲時朝代可考惜厯數傳而世遠年湮不能一一按籍稽編且仙祖之度化只求圓自巳誓願而為之度化者又無不各有其緣有真緣斯能發真敬信而所傳事迹皆足以徵景從欣合之機他不必論即所傳逐條何一不明明白白帝君當面顯化而衆生值此偏不憬然覺悟無不是過後始追憶曉然此其失之覿面者無一不同出一轍若謂帝君必先隱身試度不與人以當面接引是非帝君本願也總是衆生敬信未到極處是以良緣不能隨時湊合其實帝君皇皇救濟慈心不啻現身疾呼也今覺壇鐫聖迹紀要某適遇斯會且前緣纍纍是非某不足以為此集之證明耳其前後次第本可不編如四時行而百物生日月照而天地朗不必拘拘時見也漢夀亭侯關羽敬序
