body:
  text: 呂帝聖迹紀要呂帝聖迹紀要題詞無極寶懺曰三界飛行絶迹十方救苦尋聲知言哉知言哉我帝師普度世人等觀音之願海恆隱現而無方遍一切地則一切地皆聖迹也周一切時則一切時皆聖迹也夫豈紀之所能盡哉然無徵不信亦無妨就應現之迹而一一確指之使夫智者愚者賢不肖者皆共鑿鑿然知孚佑上帝猶在人間斯慕善者有興起皈依之忱即為惡者凛昭鑒感應之赫則即數十則之遺聞舊事而紀其要雖不能見我帝師之全體而亦足以彰慈心之妙運矣後之覽者各就見聞所及而印證之庶知駕船大海接應十方者之真為三界大恩師也宏教弟子柳守元熏沐題詞
