  text: 重刋道藏輯要呂帝聖蹟紀要
  hash: sha256:3c63c2bd97ddd1de81dd751a4c565fd14b1281d2c46b665ca4b3aebf44564754
  markers:
  - {type: page-break, offset: 0, content: '', id: YP-C_KR5i0055_14biji-05-0004a}
body:
  text: 武昌鬻梳呂帝遊武昌天心橋隱姓名鬻敝木梳索價千錢連月不售俄有老媪行乞年八十餘龍鍾傴僂秃髮如雪呂帝謂曰世人循目前襲常見吾穹價貨敝穢物豈無意而千萬人咸無超卓之見尙可與語道耶乃以梳爲媪理髮隨梳隨長鬒黑委地形容變少眾始神之爭以求梳呂帝笑曰見之不識識之不見乃投梳橋下化爲蒼龍飛去呂帝與媪不見三口一室馬善東都人熙寍初舉進士不第學道一日與一侯道人名玖行汴水見一羽士青巾布袍體秀骨異目如明水面無塵濁馬召啜茶且飮食之侯性素瞋叱之羽士曰汝有何法侯曰飛符召鬼點石化金歸錢返壁羽士曰子所爲皆非正法侯曰子何能曰吾能壯吾氣射酒肆去燭數十丈而燭立滅復吐氣吹侯面若驚風大發凛凛不可支二人起謝曰先生非凡人也幸見教羽士曰學仙須立功行功卽勤苦修鍊行卽濟人利物語及曙羽士作別曰吾將返湘水之濵與子酌於柳陰下以金令侯市酒適無酒羽士以瓶一隻命侯取汴水一瓶以藥一丸投之立成美酒三人共飮大醉羽士留詩一章曰三口共一室室畔水偏清生來走天下卽是姓兼名旣別二人測之乃知爲呂帝云吹簫圖畫京兆程梓園先生爲諸生時赴考寓一至親家夜夢一人賣畫云此畫上人能活因展看見一老人忽動徐下畫吹簫及醒時簫聲猶在耳也清晨觀堂中畫乃吳小仙冩呂帝吹簫圖遂索歸供養並誌跋竅𦀦存神監文思院趙應道病瘰幾委頓泣別親舊曰吾死矣夫閨閣中一物皆捨得獨鶴髮老親無托奈何語未竟俄有道人扣門語趙曰病不難愈也取𦀦二幅各搯其中爲一方竅徑可二尺許以授趙曰俟夜燒一幅灰之調乳香湯塗病上留一幅以待後人言訖道人不復見始悟兩方竅乃呂字也口口相傳梓潼婁道明家富善御女術常畜少女十人晝夜迭御無休息而神清體健面若桃紅或經日不食年九十有七止如三十許人尤好夸誕大言對客會飮自以爲眞仙也一日呂帝托爲乞人登門婁不識之叱使去呂帝以兩足踏石上遽成兩方竅深可二寸婁始驚異延之座右曰子非凡人也出侍女歌遊仙詞命之酒呂帝口占望江南詞酬之曰瑶池上瑞霧靄羣仙素練金童鏘鳳板青衣玉女歗鸞弦身在大羅天沈醉處縹緲玉京山唱徹步虛清燕罷不知今夕是何年海水又桑田侍女進蜀牋請書呂帝自𦀦尾倒書徹𦀦首字足不遺空隙婁大驚喜方欲請問道要答曰吾已口口相傳矣婁請益復曰吾已口口相傳矣俄登門外大柏樹杪不見後數日婁忽不快吐膏液如銀者數斗而卒席奏仙音宋陳執中建甲第東都親朋合樂俄有襤褸道士至陳問曰子何技能曰我有仙樂一部欲奏以侑華筵腰間出一軸畫挂於柱上繪仙女十二人各執樂器道士呼使下皆累累列於前兩女執幢旙以導餘女奏樂皆玉肌花貌頂七寶冠衣六銖衣金珂玉珮轉動珊然鼻上各有一粒黃玉如黍大而體甚輕虛終不類生人樂音清徹煙霄曲調特異三闋竟陳曰此何物女子道士曰此六甲六丁玉女人學道成則身中三魂七魄五臟六腑諸神皆化而爲此公亦願學否陳以爲幻惑頗不快道士顧諸女曰可去矣遂皆復上畫軸道士取軸巻而吞之索𦀦筆大書曰曽經天上三千刼又在人間五百年腰下劍鋒橫紫電爐中丹熖起蒼煙纔騎白鹿一作鶴過滄海復跨青牛八洞天小技等閒聊戲爾無人知我是眞仙末題曰谷客書卽出門不見寶輪現相紹興中新昌令關肇喜道術建大齋寶籙宮方士大集角技能呂帝隱姓氏寓焉自贊其能異眾取藥少許寘諸掌吹數過俄紅暈四溢成寶輪相現洞賓二字眾大愕覓之已不見肇後每日行陰德杜門謝客蓋因帝君言方士幻術悞人也後帝君復來授以正道枯魚復活靖康時楚州孫賣魚者盛暑呂帝遇於巿曰汝魚餒矣飮我可使活遂飮以斗酒與言竟日而去視魚果活孫自是通曉古往事决人禍福輒應後八鉢池山不出榴皮畫壁熙寍元年八月十九日湖州歸安縣沈思字引正隱於東林因名東老能釀十仙白酒一日有客自稱囘道人長揖東老曰知君白酒新熟願求一醉公命之坐徐觀其目碧色燦然光彩射人與之語無不通究知非塵埃中人也因出與飮自日中至暮已飮數斗殊無酒色囘曰久不遊浙中今爲子有陰德留詩贈子乃擘席上榴皮畫字題於菴壁云西隣已富憂不足東老雖貧樂有餘白酒釀成因好客黃金散盡爲收書按蘇東坡詩集有和詩三首世俗何知窮是病神仙可學道之餘但知白酒留佳客不問黃金覓素書符離道士晨興際華嶽先生尸解餘忽見黃庭丹篆句猶傳青𦀦小朱書凄凉雨露三年後髣髴塵埃數字餘至用榴皮緣底事中書君豈不中書黃鵠賣桃武昌省會西城外黃鵠磯石上有桃痕相傳呂帝假賣桃以驗眾售者第云歸遺稺子無有言及父母者帝君感忿擲桃於石而去其痕至今存焉鵠磯示現武昌涵三宮會首顧行恕吳一恕等三人叩求呂帝現像許以翌日赴黃鶴樓下相候三子次早赴樓前靜候良久遊人雜㳫無從物色傍午有一人於太白亭前背手徐行三子亦忽之俄見一老翁鬚髩皤然意必有異就與語仍無竒至薄暮悵惘而歸以爲誑我後示一絶云三生石畔殷殷望太白亭前欵欵行春色不知何處去空餘皓首說幽情始悟亭前獨步者卽呂帝也館案留書顧行恕又一日自涵三宮赴館途遇一道人與之語顧赴館心急不暇接言辭去及至館諸徒詫異曰先生今日何以衣裾皆香顧亦不覺視案上古文前書莫兒戲囘道人過此數字筆勢飛舞墨跡尙新方悟呂帝降神所書眾未之見而途中所遇之道人葢化相也翌日述諸會友無不歎羡會中傅敬恕寶而藏之巴陵繪像滕宗諒字子京謫守巴陵呂帝托爲囘道士見之風骨聳秀談論俊辨子京異之口占詩贈之曰華州囘道人來到岳陽城別我遊何處秋空一劍橫呂帝大笑俄不見子京倩人繪像供岳陽樓重光古鏡尙書郞賈師雄奭爲太守時有家藏古鏡甚寶嘗欲淬磨呂帝稱囘處士造焉一云有道人自稱善磨鏡乞試其技笥中取藥少許置鏡上辭去曰俟更取藥來追之巳不見但見所寓太平寺扉上題詩曰手内青蛇凌白日洞中仙菓艷長春須知物外煙霞客不是街頭磨鏡人奭見而異之知爲呂帝視鏡上藥已飛去一點光明如玉後復儒冠登武岡譙樓歎曰佳哉山水五百年無兵火可避亂也長沙警釋呂帝遊長沙托爲囘道人持小瓦罐乞錢得錢無算而罐常不滿人皆神之一日坐市道上言有能以錢滿吾罐者當授以道人爭以錢授罐竟不滿有僧驅一車錢戲曰汝罐能容否道人唯唯及推車入罐戞戞有聲俄不見僧曰神仙耶幻術耶道人口占詩曰非神亦非仙非術亦非幻天地有終窮桑田幾遷變身固非我有財亦何足戀曷不從吾遊騎鯨騰汗漫僧益驚疑道人曰若惜此錢耶吾今償你取片𦀦投罐祝曰速推車出良久不出曰非我自取不可因跳入罐寂然僧擊罐碎有片𦀦題一詩曰尋眞要識眞見眞渾未晤一笑再相逢驅車東平路僧悵然歸次東平忽見道人曰吾俟汝久矣以車還之錢皆在曰吾呂公也始謂汝可教今惜錢如此不可也僧方悔謝不及驅車東平路一作擕囊瀟湘渡囘心向道安豐縣娼曹三香染惡疾爲邸以舍往來客呂帝托爲寒士寄宿僕以其襤褸拒之三香曰吾旣立此門戸垢凈何擇焉遂延入殊禮遇之居無何曹疾作呻吟良苦呂帝曰囘心囘心時門外有一皂角樹久槁死帝君乃投以藥卽別翌日樹再生枝葉甚茂曹始悟其爲神仙而囘心者呂也卽毁冠服去粉黛棄家遠遊人爲建呂先生祠奉祀焉紹興末曹忽還鄕顔狀秀異人無識者乃自言本末復去不知所終無心昌老橫浦大庾嶺有富家子慕道建菴接雲水士多年一日眾建黃籙大齋方罷忽有一襤褸道人至求齋眾不知恤或加凌辱道人題詞於壁曰暫遊大庾白鶴飛來誰共語嶺畔人家曾見寒梅幾度花春來春去人在落花流水處花滿前蹊藏盡神仙人不知詞名減蘭卽減字木蘭花末書無心昌老來五字作三樣筆勢題畢竟入雲堂良久不出迹之已不見徐視其字深透壁後始知昌字無心乃呂也眾共歎惋昌老虛中𡽪廟時有一道人自稱昌虛中往來諸琳宮動履異常飮酒無量啖生魚肉至數十斤飲冷水數十斛天大雨雪平地七八尺餘自埋於雪中旬日不出雪霽復起行於深潭水面如履平地又善草書作枯藤遊勢一舉筆數千絡繹不斷人爭擕楮以請往往不與昌字虛中呂字也一内侍言於𡽪宗命召之不得但於其遊息處得詩曰遙指高峯笑一聲紅霞紫霧面前生每於廛市無人識長到山中有鶴迎時弄玉蟾驅鬼魅夜煎金鼎煮瓊英他時若赴蓬萊洞知我仙家有姓名無上宮主全州道士蔣暉志行高卓呂帝訪之適蔣他出帝君題詩於壁曰醉舞高歌海上山天瓢承露結金丹夜深鶴透秋光碧萬里西風一劍寒末書無上宮主訪蔣暉作蔣歸驚曰宮字無上呂字也追之不可得賓師顯法青城山丈人觀黃若谷風骨清峻戒行嚴潔常以天心符水三光正炁治疾良驗得錢帛卽以散施貧乏呂帝自稱賔法師來詣留月餘所作符篆往往吹起皆爲龍蛇雲霧飛去治鬼召將必現其形通人言語足踏成雷目瞬成電呵氣成雲噴唾成雨又善畫不用筆但含墨水噴𦀦帛上自然成山川花木宮室禽獸人物之狀略加拂拭而已每畫得錢卽市酒與若谷痛飲若谷飲素無量每爲賓所困一日若谷問曰先生操行異常人必自神仙中來還可語吾道否曰更一生可也復問夀幾何呂帝倒書九十四字於壁作兩圓相圍之卽別去始悟作圓相爲呂而賓姓其字也後若谷四十九𡻕卒果符倒書之讖同客人熙寍中江南有李先生者自號同客人持莎笠綸竿短板唱漁家傲又爲鳴榔之聲以叅之音清悲激如在青霄其詞曰二月江南山水路李花零落春無主一箇魚兒無覓處風和雨玉龍生甲歸天去詞名豆葉黃人或與錢不受與酒卽不辭後以甲辰二月終瘞之無尸始悟同客者卽呂洞賓寓意也谷客書詞崔中舉進士道過巴陵於寓邸歌沁園春樂章呂帝適以補鞵隱市井間質其所歌曰何曲也崔曰東都新聲也曰吾不解書子爲書吾詞崔爲書其詞曰七返還丹在人先須鍊已待時正一陽初動中宵漏永温温鉛鼎光透簾幃造化爭馳虎龍交媾進火功夫牛斗危牛斗危玉蟾訣亦云妙在危箕斗牛女正爲一陽初動之位曲江上看月華瑩淨有箇烏飛當時自飲刀圭又誰信無中養就兒辨水源清濁金木一作木金間隔不因師指此事難知道要玄微天機深遠下手速修猶太遲蓬萊路仗三千行滿獨步雲歸崔問姓氏曰吾生江口長山口今爲守谷客翌旦訪太守言之曰此呂洞賓也亟令召之叩其戸應聲漸遠再呼不應排戸而入閴無人矣壁有詩曰腹内嬰兒養已成且居㕓巿暫娛情無端措大剛饒舌卻入白雲深處行一云崔中舉進士遊岳陽遇眞人錄沁園春詞詰其姓名薦之李守排戸而八惟見留詩於壁云崔與太守歎恨而已南津黃襖長沙鍾將之字仲山嘉定已巳自金陵罷官歸舟次巴陵南津晡時俄覩一舟過中有黃襖翁風貌竒峻凝然伫立熟視仲山良久仲山窺其篷中無他物惟船頭有黑瓶罐十枚篷前兩青衣童參差立仲山意其必徑渡旣而僅行二丈許卽囘棹而翁已端坐篷後再熟視仲山良久俄失船所在仲山始謂巨商不與之語至是恍然驚訝知其爲異人也翌日往呂帝祠拜禮眞像儼然有兩青童侍側其貌皆與昨所見者肖仲山自恨凡目不識感歎無已周星作水調歌頭詞有更似南津港再遇呂公船之句次年卒仲山之孫嘗出其祖所繪黃襖翁眞示余誠爲清峻絶俗云世人俗眼覿面錯過者多武昌飛劍遺亭住持陳道人一日道過胭脂山將下山遇一道人負劍上山與陳覿面相遇陳初不覺繼忽思曰近世道人安有負劍者得非呂帝乎因囘視已不復見鄱陽相丁丁晋公謂倅鄱陽呂帝作一秀才往見曰吾唐呂渭之孫也經史百家無不通究因與晋公言君狀貎大似李德裕他日出處皆如之後晉公果大拜而竄海外信似贊皇矣袖詩警石石介字守道爲國子監直講一方士稱囘叟來詣袖出詩曰高心休擬鳳池遊朱紱銀章寵已優莫待禍來名欲滅林泉養浩預爲謀石遜謝不悟其旨延以酒食日將夕叟辭石留之宿曰吾孤雲野鶴安可留也其後期年因賊孔直温謀逆石嘗有書與之坐貶卒蓬萊倦客太常博士王綸守岳州有囘道人來詣貌清癯短褐不揜骭語音清圓綸問世系囘曰不必問所請敎者奕碁耳與奕綸素號國手至是連負日云暮乃酌以酒問何方人囘書詩曰仙籍班班有姓名蓬萊倦客呂先生凡人肉眼知多少不及城南老樹精綸驚訝間已失之矣庭下煙雲滃然移時不散又神仙鑑載呂帝謂綸前世係荆州僧名些善歌河滿子能前知後示寂坐化因不得金丹難免輪廻綸遂告疾還家精思仙道遇柳仙授以成丹及尸解之訣避暑遺丹石舍人玉休因避暑有襤褸樵夫持斧而前眉目秀整議論清快石問鄕里及世系曰老夫生於河南移居於終南山呂渭之裔也所學者莊子老子此外無所爲石曰終南有何佳處曰佳處甚多因舉陶隱居詩曰終南何所有所有惟白雲祗可自怡悅不堪持贈君石異之款留三月極談出有入無超生離死之法將別曰吾將往岳陽以丹一粒遺石服之年九十餘面如嬰兒巴陵犯節呂帝行巴陵巿知太守清酷欲化之候其出故犯其節前驅執之太守置諸獄令書款日將晡無一辭吏趣之帝君曰須我酒醒吏曰汝不憂罪尙以酒爲解耶言未竟忽失去但遺詩曰暫別蓬萊海上遊偶逢太守問根由身居北斗星杓下劍挂南宮月角頭道我醉來眞箇醉不知愁是怎生愁相逢何事不相識卻駕白雲歸去休太守驚曰此呂翁也夙興焚香謝過一日於水盆中見焉亟召畫吏圖之與滕子京本絶類也再詣子京滕子京守巴陵呂帝稱呂處士再詣子京與論名勝引道經云兩火一刀可以逃的係何所帝君曰言剡中諸山可以避災故漢晉以來多隱逸之士括蒼天姥是其處子京曰按會稽籍天姥在剡之東鄙接天台華頂峯旣入括州何云吳地曰禹導吳江會諸侯於祁山秦置會稽郡屬吳其郡治多靈異老子枕中記言吳之華山可度難山半有天池産千葉蓮服之羽化信宿別去詣陳處士隱士陳烈年高有道神宗遣使召之辭不赴呂帝常與往來論道適召使至祖贈以詩曰青霄一路少人行休話興亡事不成金榜因何無姓字玉都必定有仙名雲歸大海龍千尺雪滿長空鶴一聲深謝宋朝明聖主解書丹詔召先生後烈卒帝君復弔之曰天網恢恢萬象疎一身親到華山區寒雲去後留殘月春雪來時問太虛六洞眞人歸紫府千年鸞鶴老蒼梧自從遺卻先生後南北東西少丈夫掜土竒香張商英字天覺爲相有傴僂道人及門求施商英不之禮戲問有何術曰能掜土爲香卽於階側取泥掜而焚之竒香酷烈煙罷道人不見案上留詩一章掜土爲香事有因世間宜假不宜眞皇朝宰相張天覺天下雲遊呂洞賓商英自恨不識從此格去非心凡神仙鍊金丹必資土釜故仙師恆以土爲香以墨爲金亦土能生金之義合和四象交合中黃大丹旣成香透九霄復何疑哉惜天覺之不悟也王公槐劵宋參知政事王旦父祐䖍奉呂帝像一日帝君來謂曰君家世積德子孫致位三公當樹槐爲劵祐乃植三槐於庭後旦果太拜遊太平觀江州太平觀道士薛孔昭有高志呂帝訪之一云稱顔道士過訪贈詩曰落魄薛高士年高無白髭雲中閒卧石山裏冷尋碑誇我飮大酒嫌人說小詩不知甚麽漢一任輩流嗤末書云囘道人同三客訪薛鍊師作遊天慶觀宿州符離縣天慶觀有道士甯瑋少年談老莊有竒趣一日晨興有賣藥道人至卽呂帝也一云自稱抱樸子儀狀雄偉往來彌月因以老莊要旨授甯曰吾觀禪學皆出於老莊縱千經萬巻反覆議論要自立門戸源流授受其實皆本於老莊之旨甯伏地求度曰容再晤臨別贈詩曰松枯石老水縈廻個裏難教俗客來擡眼試看山外景紛紛風急障黃埃後復至適甯他往題二絶於扉上曰秋景蕭條葉亂飛庭松影裏坐移時雲遊鶴駕何方去仙洞朝元失我期二曰肘傳丹篆千年術口誦黃庭兩巻經鶴觀古壇松影裏悄無人跡戸長扄字入木寸餘墨蹟不滅又天慶觀一作秦州北山觀呂帝遊秦州天慶觀時道流悉赴鄰院醮席獨一小童在祖因索筆欲書壁童辭以觀堂新修師戒勿污壁祖曰但煩貯火殿爐欲禮三清旣往見殿後池水清泚以畫壁書曰石池清水是吾心剛被桃花影倒沉一到邽山宮闕内銷閒澄慮七絃琴末題云囘後養書壁絶高非手所能及眾歎異始悟爲呂帝云羅浮畫山呂帝遊羅浮朱明觀至小菴中値道士他出獨一小童在童揖曰先生坐此遂竊道士酒以獻呂帝滿引使小童盡其餘童不屑童素患左目内障呂帝以所餘酒噀其目忽然開明若素無患者乃取筆畫一山於壁山下作池三口謂童曰汝飮吾酒則得仙矣不飮命也然亦當享高夀言訖飛入石壁隱去及道士歸見所畫山徹壁内外大驚曰山下三口乃嵓字非呂先生乎後童果百有五𡻕而終雖未得仙亦可謂有緣者矣廬山淬劍呂帝遊江州廬山眞寂觀臨砌淬劍道士侯用晦問之曰先生劍何所用曰地上一切不平事以此去之侯心異之以酒果召飲謂曰先生道貌清高必非風塵中人帝君曰且劇飮無相窮詰旣醉以筯頭書劍詩四首於壁曰欲整鋒鋩敢憚勞凌晨開匣玉龍嘷手中氣槪氷三尺石上精神虵一條姦血默隨流水盡凶頑今逐漬痕消削平浮世不平事與爾相將上九霄虎將龍軍氣宇雄佩符持甲去匆匆鋪排劍㦸奔如電羅列旌旗疾似風活捉三尸焚鬼窟生擒六賊破魔宮河清海晏乾坤凈世世安居道德中洪爐迸濺鍊金英一點靈珠透室明擺動乾坤知道力逃移生死見功程逍遥四海留踪跡歸去三清立姓名直上青雲雲路穩紫鸞朱鳳自來迎時人若要學長生先是樞機晝夜行恍惚中間專志氣虛無裏面固元精龍交虎變三周畢兔走烏飛九轉成錬出一爐神聖藥青雲歸去路分明題畢初見若無字旣而墨蹟燦然透出壁後侯大驚再拜因問劍法曰有道劍有法劍道劍則出入無形法劍則以術治之者此俗眼所共見第能除妖去祟耳侯曰今以道劍戮奸人於稠眾中得不駭俗乎曰人以神爲母氣爲子神存則氣聚神去則氣散但戮其神則人將自沒或有假手於人皆此類也侯歎曰此眞仙之言也願聞姓氏曰吾呂巖也言訖因擲劍於空中化爲青龍跨之而去遊金鵝寺呂帝抵四明金鵝寺顧方丈蕭然頃有童子出呂問此何寥寥曰莫道寥寥虛空也不著遂佳其言題詩於壁云方丈有門出不鑰見箇山童露𩀱腳問伊方丈何寥寥道是虛空也不著聞此語何欣欣主翁豈是尋常人我來謁見不得見渴全唐作謁心耿耿生埃塵歸去也波浩渺路入蓬萊山杳杳相思一上石樓時雪晴海濶千峯曉遊廬山寺廬山開元寺僧法珍坐禪二十年頗有戒行一日定坐有一道人往謁問曰師謂坐禪可了道乎此與南岳問馬祖意同珍曰然道人曰佛戒貪瞋淫殺爲甚方其坐時自謂無此心矣及其遇景遇物不能自克則此種心紛飛莫禦道豈專在坐乎因與珍厯雲堂見一僧方酣睡謂珍曰吾偕子少坐於此試觀此僧曩見悟眞篇未載此事曰見一僧方入定坐珍曰此僧平素善入定呂曰我等且坐此試看坐未幾見僧頂門出一小蛇長三寸餘緣床左足至地遇涕唾食之復循溺器飮出軒外度小溝繞花臺若駐翫狀復欲度一小溝以水溢而返道人當其來徑以小刀插地蛇見之畏縮尋別徑至牀右足循僧頂而入睡僧遽驚覺問訊曰吾適一夢與二子言之初夢從左門出逢齋供甚精食之又逢美酒飮之因褰裳渡門外小江逢美女數十恣觀之復欲渡一小江水驟漲不能往逢一賊欲見殺走從㨗徑至右門而入遂覺道人與珍大笑出謂珍曰以床足爲門以涕唾爲供以溺爲醖以溝爲江以花木爲美女以刀爲賊人之夢寐幻妄如此珍曰爲蛇者何道人曰此僧性毒多瞋熏染變化已成蛇相此意惡也意惡隱而不現謂之陰惡故多變蛇蝎之類陽惡屬身業易見多變虎豹之類他日瞑目卽受生於蛇中矣可不懼哉吾呂公也見子精忱可以學道故來教子珍遂隨之而往不知所終此段事極好提醒迷人一云帝君後授以丹訣令潛修於青牛谷昔洪志乘青牛冲舉于此道成當來引汝遺墨成金袁州開元寺浴室有大井泉水甘冽呂帝愛之留連旬日因與寺僧欵宻僧朴野待之盡敬不知其爲呂帝也臨行以墨二笏贈僧藏之篋笥不復省一日李大臨轉漕江西行部至袁尋僧問曰呂先生嘗贈汝金乎僧恍然曰我不識呂先生但前有道人到此贈我墨耳初無金也出墨示大臨則墨卽金矣大臨摩挲駭異欲以他金易之僧弗受但以一笏轉贈之且問運使何自知此李曰昨過零陵縣見何仙姑問呂公動履何曰近呂過此自言久客宜春與開元浴室僧相善喜其有仙風道骨以金遺之吾聞此語故來驗焉旬日呂帝復來問僧墨何在僧具以告呂笑曰此女饒舌遂與僧擕手出門去不知所之一云帝君復至僧喜迎拜帝君問墨何在僧具告曰大臨王拱宸皆吾故友也遂授僧禪定之理後亦度世大雲會食呂帝托爲囘處士遊大雲寺隨堂會食月餘謂寺僧日僧饌甚精但少麪耳遂去旬日擕少許麪至自炮設數百僧皆飽足僧請處士啜茗舉丁晉公詩曰花隨僧筯破雲逐客甌圓處士曰句雖佳未盡茶之理乃書詩曰玉蘂一鎗稱絶品僧家造法極工夫兔毛甌淺香雲白蝦眼湯翻細浪俱斷送睡魔離几席增添清氣入肌膚幽叢自落溪岩外不肯移根入上都以丹一粒遺僧曰服此可不死後僧亦仙去智度贈偈呂帝南遊韶郴下湘潭至江濱聞智度寺慧覺禪學性源湻潔與促席對坐謂曰收光内照一衲之外無餘衣一鉢之外無餘食遠生死岸破煩惱殻方今佛衣寂寂無傳禪理懸懸幾絶扶而興者其在吾師乎作偈贈之曰達者推心方濟物聖賢傳法不離眞請師開說西來意七祖於今未有人自昔佛祖俱只傳法惟達磨神光一係西域一屬東土特加傳衣以表信偈曰一花開五葉結果自然成故衣止六祖不傳六祖之後若青原南嶽永嘉諸尊師皆傳佛正印紹佛慧燈五宗而下代有傳人此云七祖於今未有人蓋推尊覺公之意觀者勿眞謂六祖以下無人也禪寺植樟呂帝過華亭北禪寺手植樟樹於殿後數年樟死復來取瓢内藥一粒瘞諸根下樟復活葉葉俱瓢痕人始感悟因號呂公樟契悟黃龍呂帝經鄂州之黃龍山覩紫雲成蓋知有異人乃入值誨機禪師升座意必呂公也欲誘而進厲聲曰座旁有竊法者呂帝毅然出問曰一粒粟中藏世界半升鐺裏煮山川且道此意如何龍曰饒經八萬刼終是落空亡帝君薄訝飛劍脅之不能入遂再拜龍曰座下何人答曰雲水道人龍曰雲盡水乾時如何帝君未及對龍曰黃龍出現帝君恍然悟求指歸龍詰曰半升鐺内煮山川卽不問如何是一粒粟中藏世界帝君於言下大徹呈偈曰棄卻瓢囊摵碎琴如今不戀水中金自從一見黃龍後消盡平心種種心龍囑令加䕶卲城酒肆卲州城外有老媪開酒肆一日有呂道人來索飲偶無酒媪以所餘濁酒一升與之道人問價媪曰每升錢二十道人以指點酒書二十字於門外一紫石上而去徐視則字迹下透石底幾尺餘自是觀者如堵酒肆大售後人因其居建集仙觀海上紅雲永康軍倪庚新開酒樓有一道人至索飲自旦及暮飲佳醖已及石餘眾怪相聚以觀倪需酒金道人瞪目不語頽然醉倒倪坐守之曙鼓動道人忽起援筆題詩於壁曰鯨吸鼇吞數百杯玉山誰起復誰頽醒時兩袂天風冷一朶紅雲海上來末書云三山道士陽純作以土一塊擲倪面走出門仰望東北一朶紅雲飛來撫掌大笑俄不見刮視其壁墨徹數分視土塊乃良金也自是酒樓大售始知陽純者乃純陽也汴京茶肆宋世宗時汴京有石氏開茶肆令一㓜女行茶呂帝托爲乞者日往據上坐索飲衣服襤褸垢污殆不可近女殊無厭惡意益取上茗待之父母怒逐丏笞女女益待之月餘無厭一日復來謂女日汝肯啜我餘茶否女頗嫌不潔覆之地忽聞異香亟䑛之神氣爽然丏者日我呂仙非眞丏者惜爾不能盡飮吾餘然吾能從爾願欲富貴夀考皆可得也女曰我小家女不識何爲貴得富夀足矣後女嫁管營指揮年百三十五𡻕終廣陵妓館廣陵妓黃鶯有姿色豪客塡門一日呂帝托爲秀才假宿黃以其襤褸垢污拒之帝君乃題二詩於屏一曰嫫母西施共此身可憐老少隔千春他年鶴髮雞皮媪今日玉顔花貌人二曰花開花落兩悲歡花與人還事一般開在枝頭防客折落來地下倩誰看題畢俄不見玉樓喚醒有妓楊柳東都絶色也呂帝化一道人往來其家屢輸金帛然終不與楊交接楊一夕乘醉廹之道人曰吾先天坎離配合身中夫婦聖胎已結嬰兒將生豈復戀外色乎内交之樂過於外交之樂遠矣楊疑訝其語時宰相張天覺館賓蕭姓者與楊狎楊以道人言告蕭而蕭述於張遽往卽之道人大呼疾走徑趨棲雲菴雲堂不出良久排闥尋之不見惟壁上有詩曰一吸鸞笙裂太清綠衣童子步虛聲玉樓喚醒千年夢碧桃枝上金雞鳴詢其貌則張前所見者也後菴遭兵火而詩壁巋然獨存亦一異也全唐詩以爲題東都妓館壁吳興妓館吳興妓張珍奴色華美性淡素每夕沐浴更衣炷香告天求脫去甚切呂帝化一士人訪之珍見風神秀異禮敬殊甚往來月餘珍曰荷君眷顧已久獨不留宿何也士曰固自有意因問汝每夜龥天實何所求珍曰失身於此又將何爲但自念入是門中妄施粉黛以假爲眞謳歌艷曲以悲爲樂每歎世之愚夫覩我如花情牽意惹非但喪財多致殞命妾罪愈重惟昕夕告天早期了脫士曰汝志如此何不修道珍曰無從得師士曰吾爲汝師可乎珍卽拜叩士曰再來可也遂去珍望不至作詞曰逢師許多時不說些兒個安得仍前相對坐懊恨韶光空自過直到如今悶損我士至見詞續韻曰道無巧妙與你方兒一個子後午前定息坐夾關崑崙過恁時得氣力思量我復與太陰鍊形丹法臨別作步蟾宮一詞與之曰坎離乾兌分子午須認取自家宗祖地雷震動山頭雨待洗濯黃芽出土捉得金精牢固閉鍊甲庚要生龍虎待他問汝甚人傳但說道先生姓呂後黃覺能爲湖州守詢諸妓能爲道情詞曲者珍以前詞奏之黃訝曰呂仙師曾過汝乎珍具述所以遂得脫籍珍自是佯狂丏於市投僻地密修愈二年尸解去𡽪宗齋會宋宣和間𡽪宗設齋一千道人只闕一名適有一風癩道人求齋監門官力拒之其時𡽪宗與道士林靈素便殿談話而道人忽在其階下亟遣人令去赴齋道人以布袍袖在殿柱上一抹而往𡽪宗見而怪之起身觀柱上有粉字書云高談闊論若無人可惜明君不遇眞陛下問臣來日事請看午未丙丁春後靖康丙午丁未二帝北狩之難葢已預讖於此宋𡽪好道而不知呂帝猶梁武帝好佛而不知達磨也惜哉一云帝敬問曰君非呂仙乎曰臣姓李不姓呂忽不見帝問靈素林曰聞有李悌其狀如此詔立像於呂帝之側青城鶴會紹興末呂帝赴青城山鶴會憇一賣餅果人家人不之識也頗異之呂帝濃墨大書詩一章於門之大木上曰但患去針心眞銅水換金鬢邉無白髮騋馬去難尋葢遇呂洞賓來四字筆勢偉勁光彩殊常取刀削之深透木背呂帝已不復見時士人關雲祚者見之卽繪其像乃一清癯道人也是後餅果大售潭州鶴會潭州兵馬都監趙不閒湻熙九年四月十四日作鶴會一道人不知所從來攝衣升戺不與人揖徑入房内覓之不見但於几上得一幅𦀦書絶句云這囘相見不無緣滿院風光小洞天一劍當空又飛去洞庭驚起老龍眠末題谷客書不閒錄呈朱晦菴詳之朱子曰此呂洞賓也掛笠題詩會稽山紹興癸丑道會有道人擕凉笠而至會散乃挂笠於壁無挂笠之物而不墜題詩云偶乘青帝出蓬萊劍㦸崢嶸遍九垓我在目前人不識爲留一笠莫沈埋後始知其爲呂帝也白雲挂撘吉州舊有白雲堂在龍慶寺邊嘗有道人在堂挂撘喉下復有一口以吹鐵笛吹訖復塞以紙笠上題兩句詩一聲吹動斜陽外喚起江湖萬里心小孩羣尾其後輒將銅錢撒地使競取之後題一詩於白雲堂後云牽牛與織女依舊白蓮堂遂去皆莫曉其意後郴州冦李元礪反白雲堂閉門不容挂撘以防奸細三年後復開開之日乃七夕後一日也始悟其詩及悟二口呂字也江州挂撘江州瑞昌縣潘安撫道塲嘗有道人至求挂撘無包無傘僅有一笠襤褸村俗直堂鄙之曰你無傘無包奈何挂撘道人云旣不許挂撘覓一茶卽去直堂令之坐及出則道人反坐主席直堂怒曰不知賓主禮做甚道人道人不揖而去遺下一笠直堂不能舉遂會眾諷經謝罪遂舉其笠地上有呂字人病取土煎湯服之立愈數年間遂成一井水泡上結成呂字劃開復聚至今尙存綘紗裹藥東京一𡻕民大病瘧有老姥家鬻茶子孫皆病一日有道人來姥善待之以子孫病爲請道人曰翌旦待我姥早赴待之道人絳紗裹藥曰病發者使執之自愈一丸可愈百人過百人卽不驗矣姥從之子孫皆愈徧療及百人滿果不驗矣姥折蘘巳不見藥但有書呂洞賓三字而巳方知遇呂帝也桐廬賜藥桐廬有通守忘其姓名以母病發背百方不瘥祈禱備至感呂帝夜夢之曰公至孝感天命余救拔若遲一日不復可療乃授以靈寶膏方括蔞五枚取子乳香五塊如棗大二味各細研以白砂蜜一觔同熬成膏每服三錢温酒化下通守市藥治服卽愈後以施人立效趙州醫跛趙州貧民劉某病跛二十年每夕炷香禱天一日有道人手㩦鐵瓢謂劉曰可隨我行劉隨之行二里許指地下曰此下深三尺餘有五色石試掘之果得一石大如彈丸五彩殊常道人曰子可持歸暴露九日細末以木皮煎湯服俟愈可來城東駐雲堂東廊第三間左壁上再相會及劉疾脫然愈卽往尋之但見壁上有呂帝相㩦瓢云又鄂城貲陽有一貧婦素患癱病每日膝行至橋上乞錢一日遇一道人過見而問之婦曰夫故遺姑年八十餘來此丏些錢米以養姑耳道人聞已遂將所執棕拂子謂婦人曰汝試牽此起身來婦果牽之而起又曰汝試再隨我行婦人卽隨之行不數武婦疾大愈如平人婦曰先生何處住我好來叩謝道人曰我在某氏樓上婦歸姑見駭問具告以故次日姑媳尋至其家樓上蓋所奉孚佑帝君相也因留彼處看侍香火以終身焉此亦婦之孝念有以感之不僅愈其疾且有以資其生其慈悲爲何如耶江陵醫眼江陵傅道人名升事呂帝像甚謹乾道中正旦有一客方巾衣袍入共語良久招之同飲傅從之自是旬日一來時傅目昏多淚客教服生熟地黃切焙取川椒去核目及閉口者微炒三物等分煉蜜丸空心鹽米飮下五十丸傅服之久能視細物追思容貌宛類所事呂帝像自是奉事益䖍岳陽貨藥呂帝遊岳陽託名貨藥一粒千金三日不售乃登岳陽樓自餌其藥忽騰空而立眾方駭慕欲買其藥呂帝笑曰道在目前蓬萊跬步撫機不發當面蹉過乃吟詩曰朝遊北越暮蒼梧袖裏青蛇膽氣麤三入岳陽人不識朗吟飛過洞庭湖成都持丹成都藥巿日有道人垢面鶉衣手持丹一粒大呼於巿曰我呂洞賓也有能再拜我者以丹餌之眾以爲狂相聚笑隨之道人往還數四竟無拜之者道人往坐五顯廟前火池上兒童爭以瓦礫擲之道人笑曰世人欲見吾甚切旣見吾又不識吾亦命也呂乃自餌金丹俄五色雲周身有頃不見眾共悔恨晚矣又有當商極慕呂帝君朝夕拜禱頗䖍潔一日呂帝化一貧道人將敝袍一件欲質錢商掜袍袖内有釵一枝意道人必不知也遂將衣質錢去及取釵出内有紙一幅書云今日憶明日憶憶得我來不相識釵子留得作香錢從今與你不交易此正呂帝所謂世人欲見吾甚切旣見吾又不識吾也商後見所書悔恨不已覺能得丹黃覺能有詩名一日送客東都門外旅次見一羽士㩦有酒殽呼羽士共享之畢羽士舉杯摭水書呂字且曰明年江南見君明年果調官江南復見呂帝與以大錢七其次十又其次小錢三曰數不可益也吾以藥數寸遺子𡻕旦以酒磨服可一𡻕無病覺如其言至七十三𡻕藥亦垂竭卒於東京正符錢數德成得丹李積字德成能醫盛寒時遇一貧窘道士衣單衣無寒色與李入酒肆自據主席李怪之店者曰交錢取酒道士指店中取三酒瓶曰中各有一升酒錢店者視之果然乃以三升酒與之道士酌酒飲李止取一瓶二瓶自竭與李曰此小術耳吾呂洞賓也李驚喜道士書一絶曰九重天子寰中貴五等諸侯門外尊爭似布衣狂醉客不教性命屬乾坤以藥一粒遺李曰服此當享高夀卽別去李服藥髮不白齒不落百七𡻕而卒金陵治痿金陵萬與石嘗病痿疾左半手足不能動履者數載百法治之不愈偶出城南有道人自普德山來云爾何若此乎因以其疾告之人謂以爲偏枯道人頷之以手按其患處忽覺痛酸曰是豈得爲偏枯行當自愈矣問其姓號曰我乾姓號思屯寄寓於清源觀遂與言乾坤屯音肫䝉之旨爲天地君親師之位皆世人所不經道萬歸其疾頓釋步履如初迺以其事白諸友人皆曰乾者陽也思爲系屯爲屯得非純陽乎萬因復出訪之竟不得其所在惟呂帝之像居焉此隆慶庚午十一月事也夢仙除瘤橘齋史左丞夙病眉瘤初至館樓上夢仙拭面而瘤脫旣覺往謁呂仙亭物色如所見牧童賦詩鍾傳弱翁帥平凉呂帝幅巾衣白紵衣往見有牧童牽黃犢隨之立庭下弱翁異其氣局閒雅指牧童曰道人能詩可賦此乎道士笑曰不煩我語是兒自能之牧童乃操筆大書曰草鋪橫野六七里笛弄晚風三四聲歸來飽飯黃昏後不脫蓑衣卧月明旣別人皆見其擔二大甕長歌出郭或報弱翁曰甕二口此呂公也亟追之不復見矣黃鶴題詩武昌守倅一日對奕有道人不通姓氏直前曰吾國手也守試與奕纔下僅八子卽曰太守負矣守曰汝子未盈局安知吾負道人曰吾子已分途據要津矣是以知之已而果然如是數局守皆負俄拂袖去不見守令人尋之聞在郡治前吹笛纔至郡治前則聞笛聲在東至東則聞在西至西則聞在南至南則聞在北至北則聞在黃鶴樓前道人走往石照亭中不見但見亭中有詩曰黃鶴樓中吹笛時白蘋紅蓼滿江湄衷情欲訴無人識惟有清風明月知末書一呂字改名呂仙亭詩贈笠翁康熙辛亥夏呂帝降神於夀民佟方伯之寄園正在判事李笠翁名漁忽過之方伯曰文人至矣大仙何以教之呂帝云笠翁豈止文人眞慧人也正欲與之盤桓可先倡一韻吾當和之因呈絶句一首云今古才人總在天詩魂不死便成仙他年若許歸靈社願執諸君欵段鞭呂帝和云聞說陰陽有二天詩魔除去是神仙相期若肯歸靈窟命汝金門執玉鞭復贈一絶云瀟灑文心慧自通無端筆下起長虹波平雲散停毫處萬里秋江一笠翁詩示天基維揚石天基性喜念佛日常不輟一日遊虎邱後山絶頂殿宇輝煌傍有靜室供呂帝像因焚香默叩以時常念佛有無功效求明示夜夢示云念佛䖍誠卽是丹念珠百八轉循環念成舍利超生死念結菩提了聖凡念意不隨流水去念心常伴白雲閒念開妙竅通靈慧念偈今留與汝參廣陵散錢呂帝遊廣陵市以十千錢散之方陌及晚視之拾者無遺止遺其三一落泥中一落草中一落井中磚石縫最後有兩人汲水見而爭取之帝君曰愛財如此何可化耶路指仙姑何仙姑零陵市道女也年十三𡻕隨女伴入山採茶俄失伴獨行迷歸路見東峯下一人修髯紺目冠高冠衣六銖衣卽呂帝也仙姑始僕僕亟拜之呂帝與一桃曰食此盡他日當飛昇不然止居地中也仙姑僅食其半帝君指以歸路仙姑歸自謂止一日不知已逾月矣自是不饑無漏洞知人事休咎後尸解去呂帝嘗謂仙姑曰吾嘗遊華陰市中賣藥以靈丹一粒置他藥萬粒中有求藥者於瓢中信手探取入手而此丹入手卽墜因歎世間仙骨難値如此海蟾得道劉海蟾初名操字宗臣燕山人以明經擢甲第仕遼爲盧龍司馬累遷至相位平昔好談性命欽崇黃老及劉守光僭稱燕帝解印綬去作詩曰抛離火宅三千口屏去門兵百萬家遂改名玄英號海蟾子遍遊訪道遇呂帝授以金液還丹之要乃遁蹟修眞得成仙道遊行塵市遠汎秦川陶眞太華溷形青城上竈得度呂帝初得道自終南鶴嶺囘鄕里省墓偶步南郊蒲陰村見一人坐柳樹下性極通靈知卽行童寄兒後身也祖因曲爲點化付成丹服之易其魔相令守爐執炊呼曰郭上竈曹仙得度曹仙名景休曹皇后弟彬之孫也恥其弟景植倚勢不法伏罪遂隱蹟山岩葛巾野服矢志修眞一日孚佑帝君同正陽帝君來問曰聞子修養所養何物對曰養道曰道何在曹因指天曰天何在曹又指心二師笑曰心卽天天卽道子親見本來矣遂授以還眞祕旨令其修鍊未幾道成二師引之而去孝感遇仙鄂州治南呂仙亭前有棗樹相傳自唐以後未嘗結實一日呂帝偶憇其下忽有實如太守命小吏採而進吏性至孝親死無倚帝君教其私啖吏從之食畢卽飛去因改名仙棗亭會邵談易邵康節先生精於易理一日靜坐忽見風過占之遇兌再占外卦復遇兌喜日呂先生至矣兌爲口兩口呂也俄而一道人至邵叩其道道人曰旣知我來必知我去易理通達就中探之可得因授以口訣邵依法修之遂得尸解邵從祀聖廟其學得之希夷故當於仙品位證眞人法眞求度呂帝遊華陰一道者伏地拜迎帝君曰子何爲也對曰僕乃劉法眞昨見黃雲漸近今猶覆頂知有聖眞降臨此與關尹紫氣何異帝君因問所從來劉具述天寶中同人入夀春作茶遇一老僧令往五臺心慮其遠僧乃邀入蘭若發心出家二十餘年後知僧卽文殊菩薩一日謂曰有大魔起必索汝等令眾各散去僕後居雲臺華陰觀爲法師嗣遇仙張公弼邀入石洞尋亦别去每恨遇佛仙而心不堅遂成腰疾望聖慈救拔帝君曰子之道業過半爲心無定向今仍往拜求普賢則大行成矣予亦欲往蜀中法眞卽隨至青城山別去法眞雖未卽得道然自唐至宋厯數百年其爲法師頗著靈異重陽傳訣王重陽眞人名中孚字允卿家世咸陽大魏村人政和壬辰年生初與武甲科年四十七解組歸棄妻子拂衣塵外已卯𡻕遊於終南遇正陽帝君同孚佑帝君因再拜求道密授口訣有詩曰四十八上始逢師之句次年復遇於醴泉觀更授金丹直旨爲更名嘉字知明號重陽二師去重陽穴居以修道成出關東遊度馬丹陽孫不二夫婦並邱處機劉處玄譚處端王處一郝大通是爲七眞蕉葉題詩元趙道士肖仙者修眞杭州玄妙觀玄妙觀本唐之紫極宮錢鏐王改眞聖觀宋改天慶觀元改玄妙觀今之眞聖觀明正統間復古額元時實無眞聖之名郡邑誌載眞聖者非青霞洞鑿池山麓引泉愛植芭蕉因名芭蕉池一日帝君造訪適趙他出帝君題詩蕉上曰午夜君山玩月囘西隣小圃碧蓮開天風香霧蒼華冷名藉因由問汷來越五年再訪趙又不遇又題詩蕉上曰白雪紅鉛立聖胎美金花要十分開好同子往瀛州看雲在青霄鶴未囘又五年池畔洞前金蓮徧放趙知帝君又降不敢出無何果仙蹤三降趙曰來者莫非洞賓仙師乎帝君曰子知我來知我去否趙曰一念不起鬼神莫知帝君曰子知了性終是落於空寂夫大道之要出於自然手授詞曰悟心容易息心難息得心源到處閒斗轉星移天欲曉白雲依舊覆青山授口訣百字碑數言更囑曰虛其心實其腹凝其神守其中伏念守一如雞抱卵天根月窟往來循環工夫已到自然坎水生鉛離火生汞二候得藥四時妙用抽添温養脫胎神化方證仙階語頃竟失所在趙躬承指訣修養夀登一百六十有四化白鶴上昇弟子等感仙眞降蹟孚佑帝君及趙祖二像於蕉池雲墟之上至今存焉或云黃德淵眞人事未詳存攷仙像產芝呂帝常憇於廣西梧山郡人因搆亭其上曰呂仙亭元大厯間時疫大作有張彥才者夢一道士入其家求庭前樟樹爲呂仙像張許之明日樟被風拔置庭下疫遂息今仙像卽此木也元末像之左手指間産芝一本狀若蓮花馨香襲人武昌賣墨呂帝遊武昌爲貨墨客墨一笏僅寸餘而價錢三千連不售有鼓刀王某曰墨小而價高得無有意耶自以錢三千求一笏且與客劇飲醉歸昏睡午夜俄有叩戸者乃客以錢還之辭去比曉視墨乃紫磨金一笏上有呂字遍尋客已不復見墨化成金韓忠獻公琦晚年延方士呂帝鶉衣垢面來見韓曰君何能曰能墨試令爲之卽掘地坎溲焉韓不悅呂帝和揉坎中泥爲墨曰成矣遂去公徐取墨視之乃良金也上有呂字破之徹肌理韓追悔無已管片浮波淥江筆師翟某喜接方士呂帝往見翟館于家禮遇殊至自是往來彌年一日挈翟遊江之滸嚙筆管爲二片浮於波上呂帝履其一引翟效之翟怖不敢前呂帝笑而濟及岸俄不見翟始悔浹旬復來自挈飲食食翟皆臭腐也翟掩鼻謝弗食呂帝太息曰若不能惡食吾以肉醬兩瓿遺君遂去不復見開視醬瓿皆麩金也鱠魚再活呂帝遊廬山酒肆見剖魚作鱠曰吾令此魚再活鱠者不信呂帝以藥一粒納魚腹中良久跳躑如生鱠者驚試放於江圉圉洋洋悠然而逝旋覓呂帝不見谷客元豐中東京有道人稱谷客與布衣滕忠同飲酒將起以藥一丸遺滕滕素有風癖服之卽愈遂別又二年於揚州開明橋東遇谷客坐水次招滕滕取路跨橋而往至則無所覩始悟其爲呂帝也呂元圭呂帝遊江夏托名呂元圭往來居民楊氏家爲人言禍福事甚驗一日忽辭去曰惡人至矣吾將避之是夕提點刑獄喩某行部至鄂覓之已不見僅遺内丹一巻云詣張參政張公洎早年家居呂帝往見之與講周易倂孟子存心養性之旨因索𦀦筆作八分書詩一章微示他日將佐鼎席之意卒章曰功成當在破年後張果參知政事神光繪像呂帝遊山陽神光觀丏筆自繪已像於三清殿北墉眉目修整貌古恠不類世所傳上有北斗七大星君相被髮重珪立傍作一符徑丈餘書曰元祐二年作如知吾下筆處可以語道人有疾刮符服之輙愈或見神人儀觀甚偉曰吾神光符使也自言暴露後人以紗籠幔之長溪飯店福州長溪縣老嫗開飯肆乾道中有道人來食畢以火柴頭書壁作呂洞賓三字光艷竒偉太守聞之騎往觀則字已漸銷移時沒無餘迹信神筆也兗州妓館兗州妓侯姓者爲邸以舍客呂帝易服求授館蚤出暮歸歸必大醉逾月不償一金侯召啜茶呂帝曰吾見鍾離先生謂汝可以語道侯不省以酒飲之呂帝索飲不已侯滋不悅呂帝伸臂示之金釧燦然解其一令市酒侯利其金曰飮罷寢此乎曰可也卽登榻鼻𪖙𪖙至夜分侯廹榻呂帝以手拒之侯亟去遲明失呂帝所在視其身則手所拒處呂字徹肌上侯感悟曰此呂帝也得非吾宿世一念之差遂至於此帝君其來度我乎卽斷髮布裘往尋帝君不知所終七夕題詩元豐中呂惠卿守單州天慶觀七月七日有異人過焉書詩于𦀦曰四海孤遊一野人兩壺霜雪足精神坎離二物君收得龍虎丹行運水銀又曰野人本是天台客石橋南畔有舊宅父子生來有兩口多好笙歌不好拍惠卿婿余中解之曰後篇第一句賓字也第二句石橋者洞也第三句兩口者呂也第四句者吟也吟此詩者其呂帝乎跛仙遇道長沙劉跛仙遇呂帝于君山得靈龜吞吐之法功成歸隱岳麓自號瀟湘子常侍呂帝往來抱黃間呂帝數游城下有詩曰南山七十二獨愛洞眞墟後有鄭思者遇跛仙于清泰門外相與俱仙去治圃解經陳澹然富而儒者也性慕道延雲水士多年竟無所遇呂帝托爲傭者爲治圃𡻕餘所作工役力過常人陳愛之然止以傭者待之而已一日陳與一道友講陰符經至天發殺機天地返復未曉殺機之旨呂帝從旁抗聲曰生者不生死者不死已生而殺生未死而學死則長生矣陳大驚曰汝非傭者耶誰敎汝爲此言旣而詰之則復繆悠其辭不可解道友曰田野村夫定於何處竊得此語耳非實通曉也居無何忽辭陳曰吾將遠行明年五月五日午時復來也旣去寂然陳有鄉人客于巴陵遇之曰爲我寄語陳公我呂洞賓也始以公可授道徐察之則不然吾不復來矣言訖走入呂仙亭竹林中不見明年端午日午時陳暴卒向道人湖州沈惟心慈善多陰德其家園囿最勝慶元中有一人青布巾袍形狀竒異徑入園内守者急白主人覓之不見但於後亭壁間題詩一章曰萬里來遊蜀道長杖藜間翫百花莊誰家雞犬于家市中有神仙一島藏乳燕鳲力鳥春自在落花飛絮水微茫主人了卻明甯事向此重開綠野堂末書向道人作或云向者囘字之轉必呂帝也化呂惠卿海陵徐神翁得仙道知人休咎賓客滿門呂惠卿往謁之適有道人踞上坐不起頗以語侵惠卿惠卿拂然曰子何人斯道人答云吾與若同族乃布香爐灰於地畫灰作一詞曰鼎裏坎離壺中天地滿懷風月一吸虛空塵寰裏何人識我開口問洪濛雲中三弄笛岳陽樓外天遠霞紅笑騎黃鶴暫過海陵東拂袖呵呵歸去鑾和玉佩風響喬松君若要知吾蹤跡試與問仙翁書畢拍手大笑而去不知所之惠卿問徐徐曰卽呂帝也惠卿始悟同族之說追悔莫及天慶繪像眞州天慶觀知觀常敬仰呂帝一日發心欲塑帝像供奉匠人失期不至知觀怒甚忽一秀士來投宿詰知觀何愠知觀告以故士勸曰某善塑休動心來日塑以結緣知觀怒少解至夜醉卧曙起覓士早齋已逸去正嗟歎間忽兩三道眾來云廊下祠堂内誰塑一呂帝像知觀驚異往觀塑像神彩清竒收一足端坐非凡手所能眾驚喜醮謝之後有祈禱無不感應三遭囘祿其像獨存事載觀中碑記遊寒山寺蘇州閭門外十五里有寒山寺呂帝托呂姓秀士往遊適夜風驟作刮動㙮上銅鈴晨獨未止寺僧與帝君茶話間言及夜來鈴鐸惱人僧戲曰君是呂先生曷不立禁其響帝君笑而不答遥吹炁禁之鈴果絶響僧驚訝仰觀囘顧帝君已不見方省眞呂先生也後僧易以新鈴終不復響衡山度僧衡山僧智玄張其俗姓也一日遊本山紫葢峯之修眞院遇呂帝共話機鋒敏㨗契合大旨帝君因詢法華經云釋迦佛與多寶佛入㙮融會紫金榻上不分左右係說何事僧不能答遂作禮請問帝君曰此佛祖正法眼藏眞相空實教外心傳之妙二佛融會性命雙修也不分左右體一太虛也汝執一邊以見性爲能了何其偏乎僧再拜求點化帝君遂授以密旨僧歎曰不遇眞師幾誤此生帝君因贈一詩云得道純陽七百秋五湖四海任風流此身已出三千界一日須遊數十州醉倒清風明月夜踏翻紅蓼白蘋洲禪門衲子休相笑我在華嚴最上頭詠畢出門乘雲而去景德度僧東京景德寺之峩嵋院向有蜀僧住錫號峩嵋道者戒律精嚴越二十年不去一日有異人造訪青巾白袍丰姿瀟灑僧厚待之異人昻然直入方丈與語半夜而去期以明年今日後相見侍童皆見之迨明年次日午候僧索沐浴趺坐而逝至暮異人來歎息不已眾叩之俄失所在但見堂側壁間絶高處有詞一章題曰落日斜西風冷今夜故人來不來教人立盡梧桐影末書同省作三小字蓋寓洞賓二字减畫也其所書字筆勢飛動如舞鳳翔鸞人所莫及目講脫難目講師元時人爲陳友諒擄去羈於軍中屢欲脫去不得後友諒與明太祖大戰於嶓陽湖全軍覆没目講得脫太祖圖形遍緝師無所歸欲從寍波入海夜遁過西山指天畫地默祝神靈庇護適逢呂帝知其前因憐之以柳枝浸水灑其面逾刻白面變爲黑面以此得脫在延慶寺出家靜修多年精於地理與客談論必遮以簾幕故俗稱爲幕講師至今有地理平洋訣行於世橋柱題詞蘇州垂虹橋一日有藍褸道人攜酒於橋亭上獨酌嘯咏終日神氣飄然眾計其所飲酒自旦至晡已非人量可及而容無醉態或詢其姓氏道人取佛前爐燼題一詞於柱上曰飛梁壓水虹影沉清曉橘裏魚村半烟草算今來古往物換人非天地裏惟有江山不老雨巾風帽四海誰知道一劍横空幾番到玉龍嘶未斷月冷波寒歸去也紫極洞天誰鎖指雲屏烟障是吾廬任滿地蒼苔年年不掃後書吾洞賓也四字眾驚趨之俄不見至今立廟橋側香火甲於一郡蘇人猶有神仙之稱巴陵度松岳州巴陵縣白鶴山下有兩池潛巨蟒二條池畔植老松一樹枝幹悉槁蔓草翳焉呂帝過之見有人自樹杪降而拜曰弟子松之精也幸見眞人願求濟度祖曰汝本妖魅平日諒無善功奚可援手答曰池中兩蟒屢欲害人一云白鼉弟子每幻形待水次勸人遠避前後救活者約有數百言未已果有蟒從水中出似欲相向者呂帝叱劍斬之因授松以丹且歌曰獨自行來獨自坐世上人人不識我惟有南山老樹精分明知道神仙過今巴陵菴前猶存枯死老松惟旁一小枝獨生相傳呂帝神丹之力也世號稚松又有一巨石如墨狀亦呂帝所化至今存焉闗仙得道四明闗仙姑本貧家女㓜有出塵志年十六父母將字之關不悅避入深山餒甚拾橡栗而食忽見一老翁鬚眉垂地碧眼有光以手指關腹一畫曰吾已與汝斬赤龍矣自是可入道闗拜問道妙老翁密授玄旨關謝曰心傳雖得奈膏梁累人奚可代之老翁曰此易事耳袖中出一橡子大如彈丸光彩紆絢授曰食此卽不饑關食之移時方盡俄失老翁所在旣歸遂不喜烟火食惟啖果飮水無復天癸至動履若神行父母因不奪其志湻祐中召至闕廷謝后愛之度爲女道士錫眞人號後奉勅代太后詣龍虎山降香一羽流見之謂人曰肌膚纖麗眉目如刻畫宛然天女且神炁澹然清雅非凡人也關著作有女仙傳七巻自言所遇老翁卽呂帝云曹女得度按曹仙姑傳載呂帝遊河南至一古寺中夜深見有圓寂僧詣前作禮帝君詰之僧曰某係本寺長老及與言論機鋒頗敏㨗帝君歎曰可惜汝爲陰靈之鬼爾僧訽其故答曰吾乃純陽隨機應變人皆見之汝何能也僧疑問帝君曰汝如不信今日某家設齋吾與汝偕往赴齋以驗所言僧諾同至某家齋主迎迓坐少頃主人供齋一分於前帝君曰吾二人也何以一進主人因復供之及齋畢呂帝起謝僧惟吸炁而已其家心竊怪焉問曰先生云有二人何止先生一人也呂帝飾言辭出僧始悟拜求點化帝君曰汝欲性命𩀱修形神俱妙必假父母元炁而成尙須受生爲人方可證眞成果也僧以迷昧本眞爲慮帝君復許其提醒乃指往托化僧隨念直入京城適曹后孕當産僧卽奪舍爲女身祖恐富貴家難於解脫遂布炁醜其形后慮上見憎越三日托故送母家養育旣長貌益醜遂簪帶爲女冠後呂帝往提醒仙姑頓悟前因薰禮請問道妙得帝君授玄關祕妙修證雙圓自是舉筆成章著有語錄詩詞行世度劉高尙劉高尙天資湻厚識解超凡嘗遇一異人謂曰辟内錠鉸碎甕復完喻修眞亦如此劉遂捐富貴情愛棄儒從道遁跡林泉後遇呂帝語契遂問曰道心惟微可得見乎呂帝答曰非耳目所及惟在精神默會又問允執厥中何謂中答曰七情未發處六慾不生時是甚麽又問云何體式呂帝默然端視於空中畫一一字劉拜云萬理歸元一性太虛弟子已無疑矣呂帝復曰慧命眞空子知之乎劉不能對再拜請教呂帝密授口訣而去劉乃於渤海縣安定鎭築室居圜二十餘年修證圓成道化大行𡽪宗三下詔方至闕廷惟對以清靜自然無爲輔化之旨上問修鍊金丹祕妙對曰陛下日理萬幾此方外事不勞聖問上默然喜敬賜號微妙處士後遊羅浮山建立道場又於秀州隱眞道院顯化皆有碑記所作還元篇行於世常教門人曰神凝炁聚炁息丹成心無妄念意不外馳死心塌地不必外求三處神化度喬二郎京師喬公二郎富豪好禮英勇撝謙眞意待人慈心及物常施棺埋骨煮粥濟貧得感呂帝會遇自相見後每索酒飮至大醉或求錢物濟人喬欣然取與初無慳吝且時以狂放語言觸逆喬心如是者往來幾一年餘喬公絶不介意帝君嘉其德行援以修眞臨辭去贈長歌一篇歌見詩集中喬後因之證道度陳七子刀鑷工陳七子偕妻坐茶肆梳剃一日有道人攜白金一錠求剃鬚髮陳纔剃卽生旣生隨剃如是者自旦及暮夫婦迭換數次而手幾脫腕鬚髮仍然陳心異其人因跽請曰幸教某道可乎道人曰吾翌旦至陳早起俟之不至待月餘寂然遂棄業浪跡雲水間求之數十年無所遇意稍懈思歸去家纔五里許忽見道人自山徑中出曰吾呂公也子精忱如此何患不成道乎乃授以丹訣併與詩曰攜手三清玉帝鄉宿生緣契不尋常與君一轉金刀手削去滿頭無限霜後七子精修成證與師偕往度楊太明南康楊太明事親純孝執親之喪必廬墓三年時値七月七日楊尙居廬呂帝語之曰子八月有厄服吾藥則無恙腹間出一小壺取藥投太明吞之巳而指椸上布袍曰能與我乎楊唯唯帝君納諸壺中楊滋惑帝君笑曰吾豈爲是哉姑試子耳復探諸壺還之少頃取杯水投藥以手和之如彈丸光彩奪目謂楊曰願餌之乎楊答曰稍遲祖乃自餌焉徐云擬議卽非也子居此良苦亦思所以供朝夕否吾有以遺子乃取土一塊噓之成紫金楊謂以利餂我卻不受祖卽蹴金成石楊復曰諸君皆有詩遺我道人能惠好音乎呂祖應聲援秃筆拂地三四次濡杯水大書其壁曰楊君真確士孝行洞穹壤皇天憐其難七夕遣追往逡巡藥頑石遺子另饋享子旣不我受吾亦不知强風埃難少留願子志勿爽會當首臼几水紀青雲看反掌末書囘客贈卽辭去其字初若暗昧不可識已而色渥如赭入壁數分後至子年正月呂帝來與之偕往焉度黃先生黃先生一中棄儒入道篤志皈眞建菴桐柏山中接待雲遊道眾數年未常少怠一日呂帝過之造菴求掛撘黃見其品格非常每日敬待不弛而呂帝故觸逆以試其心黃恬不爲怪誠謹愈加呂帝始授以密印黃得大洞徹明將別去黃拜求法語帝贈以長歌一篇末書云昌虛中留此片言用表其意他日相逢必與汝訣莫退初心善養善養後三年黃隨呂帝隱去度施肩吾施肩吾字希聖湓浦人少事佛博經史攻詞章後隱居豫章西山學道遇呂帝教以五行顚倒之法三田反覆之義得以證玄道成日作詩曰重重道炁結成神玉闕金堂逐日新若記西山學道者連余卽是十三人或云鍾呂修眞傳道集會眞記皆施所編度柳眞君柳眞人名棨爲呂帝高弟傳爲北宋臣於南渡時盡難帝君嘉其忠憐其才度之成眞後從遊敷化悲願最深顯靈衞道廣施方藥濟世活人功行普遍帝君演各品仙經眞人贊助趨承典務告成晉秩玉樞右宰宏教眞君之號靈蹟彰彰別有可考俗因郭上竈事認爲柳精查閱帝君聖蹟内載郭上竈精魂附於柳樹爲帝君所度亦並非柳精幸勿錯認附會也在陸肇祥襄邑有袁家山明兵部尙書袁可立在陸園地也四圍林樹高聳巖壑水木清華景逾濯錦上建純陽寶殿額曰梦覺迷津後供呂帝閤目睡像趺坐胡床前設丹爐最後高亭四厰豁達清虛上供長生大帝及八洞仙祖聖像皆飛現雲中前後殿壁之間留題聖蹟欵多書囘道人誌乘載袁尙書始祖榮世有隱德遞及尙書祖永康父淮皆崇奉呂帝最䖍可立降生之日淮夢呂帝引一小童云汝家世代行善且知敬信我今將小徒爲爾後曰異日此地當出仙人卽以此肇祥淮甫晤而可立生一生文章事業董宗伯其昌誌載甚詳而晚尤愛道故於在陸園崇建殿宇數重位置悉係梦中指點皆隱寓丹訣之秘至今靈應昭然焉鄉國歸詠永濟北郭外明洪武間建純陽宮工甫竣製豐碑將爲文記之俄來一道士在碑旁移時而去上已有字係皮書深入三分許濕氣氤氲如墨瀋淋漓曰予自金莖謁帝囘首陽鄕國暫歸來羣迷未識吾家趣何日重尋閬苑媒今碑在殿内嵌壁上𡻕久構榻而鋒芒不减至今天將雨則筆畫濕潤眞異寶也百字碑記河中永濟縣爲呂帝故里今呂巷街遺留聖蹟甚多有仙杏及百字碑其碑乃從河水中浮出上有字云本性好清靜保養心猿定酒又何曾飲色欲已罷盡財又我不貪氣又我不競見者如不見聽者如不聽莫管他人非只尋自已病官中不係名私下憑信行遇有不輕狂如無守本分不在人殻中免卻心頭悶和光且同塵但把俗情混因甚不爭名曾共高人論碑固石也而隔面對照人人望之皆能見天相傳以爲珍異云留題九峯山西蒲州府純陽上宮係元脫脫丞相奉勅崇建宮後卽呂帝祖塋有留題九峯二什寶傳已久經臺講師朱象先篆付焚修李志全刻石今碑在宮内詩曰金鎚灼灼舞天堦獨自騎龍去又來高卧白雲觀日窟間眠秋月劈天開離花片片乾坤產坎蘂翩翩造化栽晚醉九崖迴首望北邙山下骨皚皚又曰春暖羣花半開逍遙石上徘徊獨㩦玉律金訣間踏青莎碧苔古洞眠十九載流霞飮幾千杯逢人莫話他事笑指白雲去來東岱降乩泰山記載王母池東舊有蓬萊閣下爲虬在灣曾有虬能崇人且欲水害一方呂帝以法降之俄爾石壁上自闢一洞内有聖像虬每夜朝拜焉久乃飛去内有呂帝留題曰昔日曾遊此如今九十春紅塵多少客誰是識予人後欵紹聖戊寅囘囘翁題又題曰昔年留字識曾來事滿華夷遍九垓無賴蛟虬知我字永留踪跡不沉埋後欵政和丙申題王母池北又畫符籙如雙環太極象舊刻題誌甚詳並述有眞人遺贊云留讖記以符天陰陽有凖伏蛟虬而位地功德無邊葢謂呂帝功德在民甚大非僅同世外仙人也今猶懸爲對聯供奉蓬萊閣上錦屏留題洛陽香山地接龍門脈聯樵洞呂帝嘗往來其間題識最多錦屏爲清境極勝處嘗同許眞君同題詩於此藉草爲筆書曰時當海晏河清日白鹿閒騎下翠臺本爲均平川裏去不妨卻到錦屏來囘道人書西神伏虎江南無錫縣西神山志乘詳載舊有黑虎呂帝伏之卽白雲洞故地也洞内有呂帝降示文係傳邑人馮子丹訣文曰乾坤浩蕩世界清寍六合之中惟道常尊陰形剥盡陽質斯純左擎北極右掌南辰蓬萊咫尺人所當欽西神雲洞子刻吾眞丹砂金鼎虎嘯龍吟蒼梧古柏日映月凝視彼塵世堪笑浮沉波波劫劫有甚來因何不囘頭歸侍上清邑人杜訥記曰白雲洞在惠山之石門壁立峭塹呀然中開爲吾西神第一竒勝處相傳卲文莊先生嘗遇呂帝於此予惜未之見也有友馮子守約術精黃老志篤玄宗於康熙已亥春偕馬大赤登石門見一石仆于地詢之一道者云此古聖像且晚有異光湧現土人誤毁之葢棄置埋没此間久矣于是馮子中心矍然乃披而出之命工重加修整爲呂帝像仍歸之白雲洞中與大赤崇奉唯謹因得呂帝降示丹訣洞徹玄奧震瞶啟聾洵至寶也東溟顯聖東溟大將軍陳洪範兒時遇道者眼光射人熟視公曰孺子勉之異日統數百萬𧴀貅爲國家干城幸自愛詢之知爲呂帝已未春會遼左四路進師陳公當後勁大軍失利被創墮馬僵卧草中見兒時所遇道者相慰勞云救尔者至矣旋聞馬蹄聲數百踉蹌覓路遂以馬乘將軍疾馳而歸始信呂帝之記莂不虛耳將軍念呂帝與有夙緣節鉞所至必爲立祠甘肅石城招寶皆祠之其在家則爲祠於紅螺山麓最後鎭昌平平齊凱旋搆鈴閣右隙地建堂三楹内舍爲丹室崇門邃庇比畐視諸祠尤雄麗董尙書其昌爲書所遇始末勒之石至今巋然存焉
